<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 优化移动端视口：锁定缩放，防止双击放大破坏图表交互，支持全屏 PWA 属性 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>全球资产全景量化看板 (52etf/美股/Crypto)</title>
    
    <!-- 纯代码 SVG 图标，秒开且绝对不挂 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236366f1'><path d='M5 19.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM20.25 5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z'/><path fill-rule='evenodd' d='M4.25 3a.75.75 0 0 1 .75.75v14.5h14.5a.75.75 0 0 1 0 1.5H4.25a.75.75 0 0 1-.75-.75V3.75A.75.75 0 0 1 4.25 3Z' clip-rule='evenodd'/><path d='M7.5 14.25a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1-.75-.75v-3.5ZM12.75 9.75a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 .75.75v8a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1-.75-.75v-8ZM18 6.25a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 .75.75v11.5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1-.75-.75V6.25Z'/></svg>">

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 全局尺寸死锁 */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            width: 100% !important;
            background-color: #0d1117;
            overflow: hidden;
            /* 阻止 iOS 浏览器下拉橡皮筋弹性效果，让看盘更顺滑 */
            position: fixed; 
        }

        /* 强行穿透并撑满主视窗 */
        #view-container, 
        .tradingview-widget-container, 
        .tradingview-widget-container div,
        iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
            display: block !important;
            /* 允许移动端 iframe 内部顺畅滚动 */
            -webkit-overflow-scrolling: touch;
        }

        /* 针对手机端按钮点击高亮变色的体验优化 */
        button {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="h-screen flex flex-col text-gray-200">

    <!-- 顶部导航栏：PC端横向排列，手机端紧凑布局并支持弹性换行 -->
    <header class="bg-[#161b22] border-b border-gray-800 px-4 py-2.5 md:px-6 md:py-3 flex flex-col sm:flex-row justify-between items-center gap-2.5 shrink-0">
        <div class="flex items-center gap-2 self-start sm:self-auto">
            <div class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></div>
            <h1 class="text-sm md:text-lg font-bold tracking-wide text-white">GlanceMarket 全景看板</h1>
        </div>
        
        <!-- 核心选项卡按钮组：移动端全宽显示，增大触控面积 -->
        <div class="flex w-full sm:w-auto bg-[#0d1117] p-1 rounded-xl border border-gray-800">
            <button id="btn-ashare" onclick="switchTab('ashare')" 
                class="tab-btn flex-1 sm:flex-none text-center px-3 py-2 md:px-5 md:py-2 rounded-lg font-medium text-xs md:text-sm transition-all duration-200 flex items-center justify-center gap-1.5">
                🇨🇳 52etf
            </button>
            <button id="btn-nasdaq" onclick="switchTab('nasdaq')" 
                class="tab-btn flex-1 sm:flex-none text-center px-3 py-2 md:px-5 md:py-2 rounded-lg font-medium text-xs md:text-sm transition-all duration-200 flex items-center justify-center gap-1.5">
                🇺🇸 美股
            </button>
            <button id="btn-crypto" onclick="switchTab('crypto')" 
                class="tab-btn flex-1 sm:flex-none text-center px-3 py-2 md:px-5 md:py-2 rounded-lg font-medium text-xs md:text-sm transition-all duration-200 flex items-center justify-center gap-1.5">
                🪙 Crypto
            </button>
        </div>

        <!-- 辅助工具栏：手机端隐藏时钟以精简界面，保留核心刷新按钮 -->
        <div class="text-[11px] md:text-xs text-gray-400 flex items-center justify-between w-full sm:w-auto gap-4">
            <span id="update-time" class="hidden sm:inline">初始化中...</span>
            <button onclick="refreshCurrentTab()" class="w-full sm:w-auto text-center px-3 py-1 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded-md transition-colors py-1.5 sm:py-1">
                🔄 强制刷新画布
            </button>
        </div>
    </header>

    <!-- 主渲染视窗 -->
    <main class="flex-1 w-full bg-[#0d1117] relative overflow-hidden">
        <div id="view-container" class="w-full h-full">
            <!-- 视图将在这里被实时渲染 -->
        </div>
    </main>

    <script>
        let currentTab = '';

        const mapConfigs = {
            ashare: (container) => {
                const iframe = document.createElement('iframe');
                iframe.src = "https://52etf.site/";
                // 特别允许 52etf 在移动端执行顶层导航及触控交互
                iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms');
                container.appendChild(iframe);
            },
            nasdaq: (container) => {
                const widgetDiv = document.createElement('div');
                widgetDiv.className = 'tradingview-widget-container';
                widgetDiv.innerHTML = '<div class="tradingview-widget-container__widget"></div>';
                container.appendChild(widgetDiv);

                const script = document.createElement('script');
                script.src = "https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js";
                script.type = "text/javascript";
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "exchanges": [],
                    "dataSource": "SPX500",
                    "grouping": "sector",
                    "blockSize": "market_cap_basic",
                    "blockColor": "change",
                    "locale": "zh_CN",
                    "symbolUrl": "",
                    "colorTheme": "dark",
                    "hasTopBar": true,
                    "isDataSetEnabled": true,
                    "isZoomEnabled": true,
                    "hasSymbolTooltip": true,
                    "width": "100%",
                    "height": "100%"
                });
                widgetDiv.querySelector('.tradingview-widget-container__widget').appendChild(script);
            },
            crypto: (container) => {
                const iframe = document.createElement('iframe');
                iframe.src = "https://cryptobubbles.net/";
                iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
                iframe.setAttribute('allowfullscreen', 'true');
                container.appendChild(iframe);
            }
        };

        function switchTab(tabId) {
            if (currentTab === tabId) return;
            currentTab = tabId;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/20');
                btn.classList.add('text-gray-400', 'hover:text-gray-200', 'hover:bg-gray-800/50');
            });
            const activeBtn = document.getElementById(`btn-${tabId}`);
            activeBtn.classList.remove('text-gray-400', 'hover:text-gray-200', 'hover:bg-gray-800/50');
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/20');

            const container = document.getElementById('view-container');
            container.innerHTML = '';

            if (mapConfigs[tabId]) {
                mapConfigs[tabId](container);
            }

            updateClock();
        }

        function refreshCurrentTab() {
            if (!currentTab) return;
            const container = document.getElementById('view-container');
            container.innerHTML = '';
            mapConfigs[currentTab](container);
            updateClock();
        }

        function updateClock() {
            const now = new Date();
            const timeSpan = document.getElementById('update-time');
            if (timeSpan) {
                timeSpan.innerText = `最近同步: ${now.toLocaleTimeString()}`;
            }
        }

        // 【移动端杀手级优化】监听手机横屏/竖屏旋转事件。
        // 当用户将手机横过来时，强制清空并重绘组件，确保 TradingView 和 Crypto 泡泡图能立刻抓取到横屏后的全新高宽，避免画面拉伸变形。
        window.addEventListener("orientationchange", function() {
            setTimeout(() => {
                refreshCurrentTab();
            }, 300); // 延迟 300ms 等待手机系统动画过渡完成后再精准计算像素
        });

        window.onload = () => {
            switchTab('ashare');
        };
    </script>
</body>
</html>
